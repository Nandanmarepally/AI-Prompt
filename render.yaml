# ── Render Infrastructure-as-Code (Free Tier) ────────────────────────────
# Deploy: render.com → New → Blueprint → connect this repo
# Database: Use FREE Supabase PostgreSQL (https://supabase.com)
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Django Web Service ─────────────────────────────────────────
  - type: web
    name: aiprompt-backend
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /api/tags/
    envVars:
      # Auto-generated by Render
      - key: SECRET_KEY
        generateValue: true

      # App Settings
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"

      # PostgreSQL — Set these in Render Dashboard from Supabase
      # 1. Go to render.com → Dashboard → Your Service → Environment
      # 2. Add these keys with values from Supabase
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"

      # Email Configuration — Update with your Gmail credentials
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

      # Frontend URL — Update with your deployed frontend URL
      - key: FRONTEND_URL
        value: "https://your-frontend-domain.com"
