# ── Render Infrastructure-as-Code ────────────────────────────
# Deploy:  render.com → New → Blueprint → connect this repo
# Docs:    https://render.com/docs/blueprint-spec

services:
  # ── Django Web Service ──────────────────────────────────────
  - type: web
    name: aiprompt-backend
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    healthCheckPath: /api/tags/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"

      # PostgreSQL — linked from database below
      - key: DB_NAME
        fromDatabase:
          name: aiprompt-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: aiprompt-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: aiprompt-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: aiprompt-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: aiprompt-db
          property: port

      # Redis — linked from service below
      - key: REDIS_HOST
        fromService:
          type: redis
          name: aiprompt-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: aiprompt-redis
          property: port

      # Email — add manually in Render dashboard → Environment
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: FRONTEND_URL
        value: http://localhost

  # ── Redis ──────────────────────────────────────────────────
  - type: redis
    name: aiprompt-redis
    region: singapore
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []   # empty = internal access only (secure)

# ── PostgreSQL Database ──────────────────────────────────────
databases:
  - name: aiprompt-db
    databaseName: promptdb
    user: promptuser
    region: singapore
